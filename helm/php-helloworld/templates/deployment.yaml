apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "php-helloworld.fullname" . }}
  labels:
    {{- include "php-helloworld.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "php-helloworld.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "php-helloworld.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: php-helloworld
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 80
          env:
            # Downward API - тот же принцип, что и в ручных манифестах
            # k8s/, yc/, vps/: показывает реальный под/ноду в браузере.
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            {{- range .Values.extraEnv }}
            - name: {{ .name }}
              value: {{ .value | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
