apiVersion: v1
kind: Service
metadata:
  name: {{ include "php-helloworld.fullname" . }}-svc
  labels:
    {{- include "php-helloworld.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "php-helloworld.selectorLabels" . | nindent 4 }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
