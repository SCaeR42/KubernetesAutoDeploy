apiVersion: apps/v1
kind: Deployment
metadata:
  name: php-helloworld
  labels:
    app: php-helloworld
spec:
  replicas: 3
  selector:
    matchLabels:
      app: php-helloworld
  template:
    metadata:
      labels:
        app: php-helloworld
    spec:
      containers:
        - name: php-helloworld
          image: php-helloworld:latest
          imagePullPolicy: Never   # образ берём из локального docker minikube, не тянем из registry
          ports:
            - containerPort: 80
          env:
            # Downward API: пробрасываем в контейнер данные о поде/ноде,
            # чтобы index.php мог показать, где именно он выполняется.
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
